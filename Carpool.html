<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumu'ah Carpool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom grayscale class for full vehicles */
        .full-ride {
            filter: grayscale(100%);
            opacity: 0.6;
            pointer-events: none; /* Disables clicking */
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <header id="adminTrigger" class="bg-emerald-600 text-white p-4 shadow-md text-center cursor-pointer select-none">
        <h1 class="text-2xl font-bold">🕌 Jumu'ah Carpool</h1>
        <p class="text-sm opacity-90">Let's strive for Jannah together</p>
    </header>

    <main id="app" class="max-w-md mx-auto p-4">
        </main>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        // TODO: REPLACE THIS URL WITH YOUR FIREBASE DATABASE URL
        const DB_URL = "https://openware-ai-default-rtdb.firebaseio.com/carpool"; 
        // Example: "https://friday-carpool-12345-default-rtdb.firebaseio.com"

        // ==========================================
        // DATE UTILITIES
        // ==========================================
        function formatTime12Hour(time24) {
            if (!time24) return '';
            const [hours, minutes] = time24.split(':');
            const h = parseInt(hours);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return `${h12}:${minutes} ${ampm}`;
        }

        function getUpcomingFriday() {
            const now = new Date();
            // Convert to IST (UTC+5:30)
            const istOffset = 5.5 * 60 * 60 * 1000;
            const istNow = new Date(now.getTime() + (istOffset + now.getTimezoneOffset() * 60 * 1000));
            
            const dayOfWeek = istNow.getDay(); // 0 = Sunday, 5 = Friday
            let daysUntilFriday = (5 - dayOfWeek + 7) % 7;
            
            // If today is Friday, check if it's still before Jumu'ah end time (2 PM IST)
            if (daysUntilFriday === 0) {
                const hour = istNow.getHours();
                if (hour >= 14) { // After 2 PM, show next Friday
                    daysUntilFriday = 7;
                }
            }
            
            const friday = new Date(istNow);
            friday.setDate(istNow.getDate() + daysUntilFriday);
            
            return friday;
        }

        function formatFridayDate(date) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-IN', options);
        }

        function formatShortDate(date) {
            const options = { weekday: 'short', day: 'numeric', month: 'short' };
            return date.toLocaleDateString('en-IN', options);
        }

        const upcomingFriday = getUpcomingFriday();
        const fridayDateFull = formatFridayDate(upcomingFriday);
        const fridayDateShort = formatShortDate(upcomingFriday);

        // ==========================================
        // ADMIN TRIGGER (10 clicks on header)
        // ==========================================
        let clickCount = 0;
        let clickTimer = null;
        const CLICK_THRESHOLD = 10;
        const CLICK_TIMEOUT = 3000; // Reset after 3 seconds of no clicks

        document.getElementById('adminTrigger').addEventListener('click', () => {
            clickCount++;
            
            // Reset timer on each click
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                clickCount = 0;
            }, CLICK_TIMEOUT);

            if (clickCount >= CLICK_THRESHOLD) {
                clickCount = 0;
                clearTimeout(clickTimer);
                renderAdminConsole();
            }
        });

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        const app = document.getElementById('app');

        // Initial Load
        renderHome();

        // ==========================================
        // VIEWS (UI)
        // ==========================================

        async function renderAdminConsole() {
            app.innerHTML = `<div class="text-center mt-10 text-gray-500">Loading admin console...</div>`;
            
            try {
                const response = await fetch(`${DB_URL}/rides.json`);
                const data = await response.json();
                
                let html = `
                    <button onclick="renderHome()" class="text-sm text-gray-500 mb-4">← Back to Home</button>
                    <h2 class="text-xl font-bold mb-4 text-red-700">🔐 Admin Console</h2>
                    <div class="space-y-4">
                `;

                if (!data || Object.keys(data).length === 0) {
                    html += `<div class="text-center text-gray-400 py-10">No rides in database.</div>`;
                } else {
                    const rides = Object.entries(data).map(([id, ride]) => ({ id, ...ride }));
                    
                    rides.forEach(ride => {
                        const passengers = ride.passengers ? Object.values(ride.passengers) : [];
                        const createdDate = new Date(ride.created_at).toLocaleString();
                        const formattedTime = formatTime12Hour(ride.departure_time);
                        
                        html += `
                            <div class="bg-white p-4 rounded-lg shadow border border-red-200">
                                <div class="flex justify-between items-start mb-2">
                                    <div>
                                        <h3 class="font-bold text-lg">${ride.masjid_name}</h3>
                                        <p class="text-gray-600 text-sm">🕒 ${formattedTime}</p>
                                        <p class="text-gray-400 text-xs">Created: ${createdDate}</p>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="showEditForm('${ride.id}')" class="bg-yellow-500 text-white px-3 py-1 rounded text-sm hover:bg-yellow-600">✏️ Edit</button>
                                        <button onclick="deleteRide('${ride.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600">🗑️ Delete</button>
                                    </div>
                                </div>
                                
                                <div class="text-sm text-gray-700 mb-2">
                                    <span class="font-semibold">${ride.owner_name}</span> 
                                    <span class="text-gray-400">(${ride.vehicle_type})</span>
                                    <span class="text-gray-400">| ${ride.owner_phone}</span>
                                </div>
                                
                                <div class="text-sm text-gray-600">
                                    Seats: ${ride.total_seats} | Passengers: ${passengers.length}
                                </div>
                                
                                <div id="edit-form-${ride.id}" class="hidden mt-3 p-3 bg-gray-50 rounded border">
                                    <div class="space-y-2">
                                        <input type="text" id="edit-name-${ride.id}" value="${ride.owner_name}" placeholder="Owner Name" class="w-full p-2 border text-sm rounded">
                                        <input type="tel" id="edit-phone-${ride.id}" value="${ride.owner_phone}" placeholder="Phone" class="w-full p-2 border text-sm rounded">
                                        <input type="text" id="edit-masjid-${ride.id}" value="${ride.masjid_name}" placeholder="Masjid Name" class="w-full p-2 border text-sm rounded">
                                        <input type="time" id="edit-time-${ride.id}" value="${ride.departure_time}" class="w-full p-2 border text-sm rounded">
                                        <input type="number" id="edit-seats-${ride.id}" value="${ride.total_seats}" min="1" max="10" placeholder="Total Seats" class="w-full p-2 border text-sm rounded">
                                        <select id="edit-vehicle-${ride.id}" class="w-full p-2 border text-sm rounded">
                                            <option value="Car" ${ride.vehicle_type === 'Car' ? 'selected' : ''}>Car</option>
                                            <option value="Bike" ${ride.vehicle_type === 'Bike' ? 'selected' : ''}>Bike</option>
                                        </select>
                                        <div class="flex gap-2">
                                            <button onclick="saveEdit('${ride.id}')" class="flex-1 bg-green-600 text-white py-1 rounded text-sm">Save</button>
                                            <button onclick="hideEditForm('${ride.id}')" class="flex-1 bg-gray-300 text-gray-700 py-1 rounded text-sm">Cancel</button>
                                        </div>
                                    </div>
                                </div>
                                
                                ${passengers.length > 0 ? `
                                    <div class="mt-2 pt-2 border-t">
                                        <p class="text-xs text-gray-500 font-semibold mb-1">Passengers:</p>
                                        ${Object.entries(ride.passengers).map(([pId, p]) => `
                                            <div class="flex justify-between items-center text-xs text-gray-600 py-1">
                                                <span>${p.name} ${p.phone ? '(' + p.phone + ')' : ''}</span>
                                                <button onclick="deletePassenger('${ride.id}', '${pId}')" class="text-red-500 hover:text-red-700">✕</button>
                                            </div>
                                        `).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    });
                }

                html += `</div>`;
                app.innerHTML = html;

            } catch (err) {
                app.innerHTML = `<div class="text-center text-red-500 mt-10">Error loading admin data: ${err.message}</div>`;
            }
        }

        function showEditForm(id) {
            document.getElementById(`edit-form-${id}`).classList.remove('hidden');
        }

        function hideEditForm(id) {
            document.getElementById(`edit-form-${id}`).classList.add('hidden');
        }

        async function saveEdit(rideId) {
            const updatedData = {
                owner_name: document.getElementById(`edit-name-${rideId}`).value,
                owner_phone: document.getElementById(`edit-phone-${rideId}`).value,
                masjid_name: document.getElementById(`edit-masjid-${rideId}`).value,
                departure_time: document.getElementById(`edit-time-${rideId}`).value,
                total_seats: parseInt(document.getElementById(`edit-seats-${rideId}`).value),
                vehicle_type: document.getElementById(`edit-vehicle-${rideId}`).value
            };

            try {
                await fetch(`${DB_URL}/rides/${rideId}.json`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                alert("Ride updated successfully!");
                renderAdminConsole();
            } catch (err) {
                alert("Error updating ride: " + err.message);
            }
        }

        async function deleteRide(rideId) {
            if (!confirm("Are you sure you want to delete this ride?")) return;
            
            try {
                await fetch(`${DB_URL}/rides/${rideId}.json`, {
                    method: 'DELETE'
                });
                alert("Ride deleted successfully!");
                renderAdminConsole();
            } catch (err) {
                alert("Error deleting ride: " + err.message);
            }
        }

        async function deletePassenger(rideId, passengerId) {
            if (!confirm("Remove this passenger?")) return;
            
            try {
                await fetch(`${DB_URL}/rides/${rideId}/passengers/${passengerId}.json`, {
                    method: 'DELETE'
                });
                renderAdminConsole();
            } catch (err) {
                alert("Error removing passenger: " + err.message);
            }
        }

        function renderHome() {
            app.innerHTML = `
                <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-4 mb-4 mt-4 text-center">
                    <p class="text-emerald-800 text-sm">
                        🗓️ Carpooling for <span class="font-bold">${fridayDateFull}</span>
                    </p>
                    <p class="text-emerald-600 text-xs mt-1">Book your ride for this Jumu'ah prayer</p>
                </div>
                
                <div class="flex flex-col gap-4 mt-4">
                    <button onclick="renderRegister()" class="p-8 bg-white border-2 border-emerald-500 rounded-xl shadow-lg hover:bg-emerald-50 transition flex flex-col items-center">
                        <span class="text-4xl mb-2">🚗 🏍️</span>
                        <span class="text-xl font-bold text-emerald-700">I Have a Vehicle</span>
                        <span class="text-gray-500 text-sm">Offer a ride (Car or Bike)</span>
                    </button>

                    <button onclick="fetchAndRenderList()" class="p-8 bg-white border-2 border-blue-500 rounded-xl shadow-lg hover:bg-blue-50 transition flex flex-col items-center">
                        <span class="text-4xl mb-2">🙋‍♂️</span>
                        <span class="text-xl font-bold text-blue-700">I Need a Ride</span>
                        <span class="text-gray-500 text-sm">Find available seats</span>
                    </button>
                </div>
            `;
        }

        function renderRegister() {
            app.innerHTML = `
                <button onclick="renderHome()" class="text-sm text-gray-500 mb-4">← Back to Home</button>
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-xl font-bold mb-4 text-emerald-700">Offer a Ride</h2>
                    <form id="rideForm" onsubmit="handlePostRide(event)" class="space-y-3">
                        
                        <div>
                            <label class="block text-sm font-medium">Your Name</label>
                            <input type="text" id="ownerName" required class="w-full p-2 border rounded">
                        </div>

                        <div>
                            <label class="block text-sm font-medium">Phone Number (WhatsApp)</label>
                            <div class="flex">
                                <span class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border border-r-0 border-gray-300 rounded-l">+91</span>
                                <input type="tel" id="ownerPhone" pattern="[0-9]{10}" maxlength="10" placeholder="10 digit number" required class="w-full p-2 border rounded-r">
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <div class="w-1/2">
                                <label class="block text-sm font-medium">Vehicle</label>
                                <select id="vehicleType" onchange="toggleHelmetOption()" class="w-full p-2 border rounded">
                                    <option value="Car">Car</option>
                                    <option value="Bike">Bike</option>
                                </select>
                            </div>
                            <div class="w-1/2">
                                <label class="block text-sm font-medium">Seats Available</label>
                                <input type="number" id="seats" min="1" max="10" required class="w-full p-2 border rounded">
                            </div>
                        </div>

                        <div id="helmetDiv" class="hidden">
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" id="extraHelmet" class="form-checkbox h-5 w-5 text-emerald-600">
                                <span class="text-sm text-gray-700">I have an extra helmet</span>
                            </label>
                        </div>

                        <div>
                            <label class="block text-sm font-medium">Masjid Name</label>
                            <input type="text" id="masjid" placeholder="e.g. Samsung Campus Masjid" required class="w-full p-2 border rounded">
                        </div>

                        <div>
                            <label class="block text-sm font-medium">Departure Time</label>
                            <input type="time" id="time" required class="w-full p-2 border rounded">
                        </div>

                        <div>
                            <label class="block text-sm font-medium">Your Current Location</label>
                            <div class="flex gap-2">
                                <input type="text" id="locationText" placeholder="Click to get location" readonly class="w-full p-2 border rounded bg-gray-50 text-sm">
                                <button type="button" onclick="getLocation()" id="locBtn" class="px-4 py-2 bg-blue-500 text-white rounded text-sm hover:bg-blue-600 whitespace-nowrap">📍 Get</button>
                            </div>
                            <input type="hidden" id="latitude">
                            <input type="hidden" id="longitude">
                            <p class="text-xs text-gray-400 mt-1">This helps riders find you easily</p>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-emerald-600 text-white py-3 rounded font-bold hover:bg-emerald-700 mt-4">
                            Post Ride
                        </button>
                    </form>
                </div>
            `;
        }

        function renderList(rides = []) {
            let html = `
                <button onclick="renderHome()" class="text-sm text-gray-500 mb-4">← Back to Home</button>
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4 text-center">
                    <p class="text-blue-800 text-sm font-medium">🗓️ Rides for ${fridayDateFull}</p>
                </div>
                <h2 class="text-xl font-bold mb-2 text-blue-700">Available Rides</h2>
                <p class="text-xs text-gray-500 mb-3">📱 Tap phone to call • 📍 Tap location to navigate</p>
                <div class="space-y-4">
            `;

            if (rides.length === 0) {
                html += `<div class="text-center text-gray-400 py-10">No active rides found.</div>`;
            }

            rides.forEach(ride => {
                const passengers = ride.passengers ? Object.values(ride.passengers) : [];
                const seatsTaken = passengers.length;
                const seatsLeft = ride.total_seats - seatsTaken;
                const isFull = seatsLeft <= 0;

                // Format time to 12-hour format with AM/PM
                const formattedTime = formatTime12Hour(ride.departure_time);

                // If full, add the grayscale class
                const cardClass = isFull ? "bg-white p-4 rounded-lg shadow border border-gray-200 full-ride" : "bg-white p-4 rounded-lg shadow border border-blue-100";
                const statusText = isFull ? `<span class="text-red-500 font-bold">FULL</span>` : `<span class="text-green-600 font-bold">${seatsLeft} seat${seatsLeft > 1 ? 's' : ''} left</span>`;
                
                const helmetBadge = (ride.vehicle_type === 'Bike') 
                    ? (ride.extra_helmet 
                        ? `<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded">⛑️ Helmet provided</span>` 
                        : `<span class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded">⛑️ Bring your helmet</span>`)
                    : '';

                const vehicleEmoji = ride.vehicle_type === 'Bike' ? '🏍️' : '🚗';
                
                // Location link
                const locationLink = (ride.latitude && ride.longitude) 
                    ? `<a href="https://www.google.com/maps?q=${ride.latitude},${ride.longitude}" target="_blank" class="inline-flex items-center gap-1 text-blue-600 hover:text-blue-800 text-xs bg-blue-50 px-2 py-1 rounded">
                        📍 Navigate to pickup
                       </a>`
                    : `<span class="text-xs text-gray-400">📍 Location not shared</span>`;

                // WhatsApp group link (owner + all passengers)
                const allPhones = [ride.owner_phone, ...passengers.map(p => p.phone).filter(Boolean)];
                const whatsappGroupText = encodeURIComponent(`Jumu'ah Carpool - ${fridayDateShort}\n📍 ${ride.masjid_name}\n🕒 ${formattedTime}\n\n🚗 Driver: ${ride.owner_name}\n📞 +91 ${ride.owner_phone}\nVehicle: ${ride.vehicle_type}\n\n👥 Passengers:\n${passengers.map(p => `• ${p.name}`).join('\n') || 'None yet'}`);
                
                html += `
                    <div class="${cardClass}">
                        <!-- Header: Masjid & Status -->
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-lg text-gray-800">🕌 ${ride.masjid_name}</h3>
                                <p class="text-gray-600 text-sm font-medium">🕒 ${fridayDateShort}, ${formattedTime}</p>
                            </div>
                            <div class="text-right">
                                ${statusText}
                            </div>
                        </div>
                        
                        <!-- Driver Info Card -->
                        <div class="bg-gray-50 rounded-lg p-3 mb-3">
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-2xl">${vehicleEmoji}</span>
                                    <div>
                                        <p class="font-semibold text-gray-800">${ride.owner_name}</p>
                                        <p class="text-xs text-gray-500">${ride.vehicle_type} • ${ride.total_seats} seat${ride.total_seats > 1 ? 's' : ''} total</p>
                                    </div>
                                </div>
                                ${helmetBadge}
                            </div>
                            
                            <!-- Contact & Location Row -->
                            <div class="flex flex-wrap gap-2 mt-2">
                                <a href="tel:+91${ride.owner_phone}" class="inline-flex items-center gap-1 text-green-700 hover:text-green-900 text-sm bg-green-100 px-3 py-1.5 rounded-full font-medium">
                                    📞 +91 ${ride.owner_phone}
                                </a>
                                ${locationLink}
                            </div>
                        </div>

                        <!-- Passengers List -->
                        <div class="mb-3">
                            <p class="text-xs font-semibold text-gray-500 mb-1">👥 Passengers (${seatsTaken}/${ride.total_seats}):</p>
                            ${passengers.length > 0 
                                ? `<div class="flex flex-wrap gap-1">
                                    ${passengers.map(p => `<span class="bg-blue-50 text-blue-700 text-xs px-2 py-1 rounded">${p.name}</span>`).join('')}
                                   </div>`
                                : `<p class="text-xs text-gray-400 italic">No passengers yet - be the first!</p>`
                            }
                        </div>

                        <!-- Action Buttons -->
                        <div class="border-t pt-3">
                            ${!isFull ? `
                                <div id="join-form-${ride.id}">
                                    <button onclick="showJoinInputs('${ride.id}')" class="w-full bg-blue-500 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-600 transition">
                                        🙋 Join This Ride
                                    </button>
                                </div>
                                <div id="confirm-form-${ride.id}" class="hidden mt-2 space-y-2">
                                    <input type="text" id="p-name-${ride.id}" placeholder="Your Name (Required)" class="w-full p-2 border text-sm rounded">
                                    <div class="flex">
                                        <span class="inline-flex items-center px-2 text-xs text-gray-900 bg-gray-200 border border-r-0 border-gray-300 rounded-l">+91</span>
                                        <input type="tel" id="p-phone-${ride.id}" pattern="[0-9]{10}" maxlength="10" placeholder="WhatsApp Number (Required)" class="w-full p-2 border text-sm rounded-r">
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="handleJoin('${ride.id}')" class="flex-1 bg-green-600 text-white py-2 rounded text-sm font-semibold">✓ Confirm</button>
                                        <button onclick="cancelJoin('${ride.id}')" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded text-sm">Cancel</button>
                                    </div>
                                </div>
                            ` : `
                                <div class="text-center text-sm text-gray-400 italic py-2">🚫 This ride is full</div>
                            `}
                            
                            ${passengers.length > 0 ? `
                                <a href="https://wa.me/?text=${whatsappGroupText}" target="_blank" 
                                   class="mt-2 w-full bg-green-500 text-white py-2 rounded-lg text-sm font-semibold hover:bg-green-600 transition flex items-center justify-center gap-2">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                    Share Ride on WhatsApp
                                </a>
                            ` : ''}
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            app.innerHTML = html;
        }

        // ==========================================
        // LOGIC & DATA HANDLING
        // ==========================================

        function getLocation() {
            const locBtn = document.getElementById('locBtn');
            const locText = document.getElementById('locationText');
            
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser");
                return;
            }

            locBtn.innerText = "⏳...";
            locBtn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    document.getElementById('latitude').value = lat;
                    document.getElementById('longitude').value = lng;
                    locText.value = `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                    locBtn.innerText = "✓ Got it";
                    locBtn.classList.remove('bg-blue-500', 'hover:bg-blue-600');
                    locBtn.classList.add('bg-green-500');
                },
                (error) => {
                    alert("Unable to get location. Please enable location access.");
                    locBtn.innerText = "📍 Retry";
                    locBtn.disabled = false;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function toggleHelmetOption() {
            const type = document.getElementById('vehicleType').value;
            const div = document.getElementById('helmetDiv');
            const seatsInput = document.getElementById('seats');
            
            if(type === 'Bike') {
                div.classList.remove('hidden');
                seatsInput.max = 1;
                seatsInput.value = 1;
            } else {
                div.classList.add('hidden');
                seatsInput.max = 10;
            }
        }

        async function handlePostRide(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Posting...";
            btn.disabled = true;

            const latitude = document.getElementById('latitude').value;
            const longitude = document.getElementById('longitude').value;

            const rideData = {
                owner_name: document.getElementById('ownerName').value,
                owner_phone: document.getElementById('ownerPhone').value,
                vehicle_type: document.getElementById('vehicleType').value,
                total_seats: parseInt(document.getElementById('seats').value),
                masjid_name: document.getElementById('masjid').value,
                departure_time: document.getElementById('time').value,
                extra_helmet: document.getElementById('extraHelmet').checked,
                latitude: latitude || null,
                longitude: longitude || null,
                created_at: Date.now() // Timestamp for expiration logic
            };

            try {
                // REST API Call to Firebase
                await fetch(`${DB_URL}/rides.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(rideData)
                });
                alert("Ride Posted Successfully!");
                fetchAndRenderList();
            } catch (err) {
                alert("Error posting ride: " + err.message);
                btn.innerText = "Post Ride";
                btn.disabled = false;
            }
        }

        async function fetchAndRenderList() {
            app.innerHTML = `<div class="text-center mt-10 text-gray-500">Loading rides...</div>`;
            
            try {
                const response = await fetch(`${DB_URL}/rides.json`);
                const data = await response.json();
                
                if (!data) {
                    renderList([]);
                    return;
                }

                // Get the most recent Friday 2 PM cutoff (to filter out old rides)
                const now = new Date();
                const istOffset = 5.5 * 60 * 60 * 1000;
                const istNow = new Date(now.getTime() + (istOffset + now.getTimezoneOffset() * 60 * 1000));
                
                // Calculate the most recent Friday 2 PM that has passed
                const dayOfWeek = istNow.getDay();
                const hour = istNow.getHours();
                
                let daysSinceLastFridayCutoff;
                if (dayOfWeek === 5 && hour >= 14) {
                    // It's Friday after 2 PM - cutoff is today at 2 PM
                    daysSinceLastFridayCutoff = 0;
                } else if (dayOfWeek === 5 && hour < 14) {
                    // It's Friday before 2 PM - cutoff was last Friday at 2 PM
                    daysSinceLastFridayCutoff = 7;
                } else {
                    // Other days - calculate days since last Friday
                    daysSinceLastFridayCutoff = (dayOfWeek - 5 + 7) % 7;
                    if (daysSinceLastFridayCutoff === 0) daysSinceLastFridayCutoff = 7;
                }
                
                const lastFridayCutoff = new Date(istNow);
                lastFridayCutoff.setDate(istNow.getDate() - daysSinceLastFridayCutoff);
                lastFridayCutoff.setHours(14, 0, 0, 0);
                const cutoffTimestamp = lastFridayCutoff.getTime();

                const rides = Object.entries(data)
                    .map(([id, ride]) => ({ id, ...ride }))
                    .filter(ride => {
                        // Only show rides created after the last Friday 2 PM IST cutoff
                        return ride.created_at > cutoffTimestamp;
                    });
                
                // Sort rides by departure time
                rides.sort((a, b) => a.departure_time.localeCompare(b.departure_time));

                renderList(rides);

            } catch (err) {
                app.innerHTML = `<div class="text-center text-red-500 mt-10">Error loading data. Check internet connection.</div>`;
            }
        }

        function showJoinInputs(id) {
            document.getElementById(`join-form-${id}`).classList.add('hidden');
            document.getElementById(`confirm-form-${id}`).classList.remove('hidden');
        }

        function cancelJoin(id) {
            document.getElementById(`join-form-${id}`).classList.remove('hidden');
            document.getElementById(`confirm-form-${id}`).classList.add('hidden');
        }

        async function handleJoin(rideId) {
            const name = document.getElementById(`p-name-${rideId}`).value.trim();
            const phone = document.getElementById(`p-phone-${rideId}`).value.trim();

            if (!name) {
                alert("Name is required!");
                return;
            }

            if (!phone || phone.length !== 10 || !/^\d{10}$/.test(phone)) {
                alert("Please enter a valid 10-digit WhatsApp number!");
                return;
            }

            const passengerData = { name, phone };

            try {
                // Add passenger to the specific ride's 'passengers' list
                await fetch(`${DB_URL}/rides/${rideId}/passengers.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(passengerData)
                });
                alert(`✅ Seat booked successfully!\n\nYou can now contact the driver or share ride details via WhatsApp.`);
                // Reload list to update seat count and grey out if full
                fetchAndRenderList(); 
            } catch (err) {
                alert("Error booking seat. Please try again.");
            }
        }
    </script>
